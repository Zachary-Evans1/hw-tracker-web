<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #333; }
        input { padding: 8px; margin: 4px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 12px; margin: 4px; border: none; border-radius: 4px; cursor: pointer; }
        .add-btn { background: #4CAF50; color: white; }
        .assignment { padding: 12px; border: 1px solid #ddd; border-radius: 4px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .completed { background: #f0fff0; text-decoration: line-through; color: #888; }
        .complete-btn { background: #4CAF50; color: white; }
        .incomplete-btn { background: #ff9800; color: white; }
        .delete-btn { background: #f44336; color: white; }
    </style>
</head>
<body>
    <h1>HW Tracker</h1>

    <div>
        <input id="courseName" type="text" placeholder="Course name" />
        <input id="hwName" type="text" placeholder="Assignment name" />
        <input id="dueDate" type="text" placeholder="MM/DD/YYYY" />
        <button class="add-btn" onclick="addAssignment()">Add</button>
    </div>

    <div id="assignments"></div>

    <script>
        async function loadAssignments() {
            const res = await fetch("/assignments");
            const assignments = await res.json();
            const container = document.getElementById("assignments");
            container.innerHTML = "";
            assignments.forEach((a, i) => {
                container.innerHTML += `
                    <div class="assignment ${a.completed ? "completed" : ""}">
                        <span><b>${a.courseName}</b> — ${a.hwName} (Due: ${a.dueDate})</span>
                        <div>
                            ${a.completed
                                ? `<button class="incomplete-btn" onclick="markIncomplete(${i})">Undo</button>`
                                : `<button class="complete-btn" onclick="markComplete(${i})">Done</button>`
                            }
                            <button class="delete-btn" onclick="deleteAssignment(${i})">Delete</button>
                        </div>
                    </div>`;
            });
        }

        async function addAssignment() {
            const courseName = document.getElementById("courseName").value;
            const hwName = document.getElementById("hwName").value;
            const dueDate = document.getElementById("dueDate").value;
            if (!courseName || !hwName || !dueDate) return;
            await fetch("/assignments", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ courseName, hwName, dueDate })
            });
            document.getElementById("courseName").value = "";
            document.getElementById("hwName").value = "";
            document.getElementById("dueDate").value = "";
            loadAssignments();
        }

        async function deleteAssignment(index) {
            await fetch(`/assignments/${index}`, { method: "DELETE" });
            loadAssignments();
        }

        async function markComplete(index) {
            await fetch(`/assignments/${index}/complete`, { method: "PUT" });
            loadAssignments();
        }

        async function markIncomplete(index) {
            await fetch(`/assignments/${index}/incomplete`, { method: "PUT" });
            loadAssignments();
        }

        loadAssignments();
    </script>
</body>
</html>
